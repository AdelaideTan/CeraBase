name: CeraBase Daily Automation

on:
  schedule:
    # 每天早上 8 點執行 (UTC時間 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動按鈕觸發

jobs:
  run-daily-job:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv crewai cerebras-cloud-sdk supabase line-bot-sdk requests beautifulsoup4 streamlit pydantic
        
    - name: Run Daily Automation (main.py)
      env:
        # 在 GitHub 專案的 Settings -> Secrets and variables -> Actions 中設定以下變數
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
      run: |
        python main.py
